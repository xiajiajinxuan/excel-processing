default_rule: continuous_work_rule

# 更新检查配置（GitHub/Gitee Releases）
update:
  enabled: true
  source: github   # 或 github
  owner: "xiajiajinxuan"       # 你的用户名或组织名
  repo: "excel-processing"
  tag_prefix: ""  # 可选：仅当 tag 符合该前缀时才视为本应用发布

rules:
  continuous_work_rule:
    display_name: 连续工作超时检测
    template: 工作超6天查找.xlsx
  canteen_deduction_rules:
    display_name: 食堂扣缴规则
    template: 食堂扣缴.xlsx

